<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F97316" />
  <meta name="description" content="AfriFoundry field data collection — offline-first, 15 sectors, 225+ items" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AfriScout" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet" />
  <title>AfriScout</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { height:100%; background:#080810; }
    .splash { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#080810; }
    .splash-icon { font-size:40px; margin-bottom:10px; }
    .splash-name { font-size:20px; font-weight:800; color:#F97316; font-family:'DM Sans',system-ui,sans-serif; }
    .splash-sub  { font-size:12px; color:#475569; margin-top:4px; font-family:'DM Sans',system-ui,sans-serif; }
  </style>
</head>
<body>
  <div id="root">
    <div class="splash">
      <div class="splash-icon">🔥</div>
      <div class="splash-name">AfriScout</div>
      <div class="splash-sub">Loading...</div>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(() => console.log('AfriScout SW registered'))
          .catch(err => console.warn('SW failed:', err));
      });
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
